<!DOCTYPE html>
<html>
<head>
  <title>Login de prueba - Firebase</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
  <h2>Login con Firebase</h2>
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Contraseña" />
  <button onclick="login()">Iniciar sesión</button>

  <pre id="resultado"></pre>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC8gokmmf8rO3qooeP6w0P11tbQHyGCLB8",
      authDomain: "app-oficios-ffc35.firebaseapp.com",
      projectId: "app-oficios-ffc35",
    };

    firebase.initializeApp(firebaseConfig);

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
        const token = await userCredential.user.getIdToken();
        document.getElementById("resultado").innerText = "Token JWT:\n\n" + token;
        console.log("Token:", token);
      } catch (error) {
        document.getElementById("resultado").innerText = "Error: " + error.message;
      }
    }
  </script>
</body>
</html>
